services:
  db:
    image: postgres:16
    container_name: it-ticketing-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: it_ticketing
      POSTGRES_USER: ticket_user
      POSTGRES_PASSWORD: ticket_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket_user -d it_ticketing"]
      interval: 10s
      timeout: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    container_name: it-ticketing-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: it-ticketing-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ticket_user:ticket_pass@db:5432/it_ticketing
      SESSION_SECRET: docker-desktop-demo-secret-change-me-to-32-plus-chars
      NEXT_PUBLIC_HCAPTCHA_SITE_KEY: 10000000-ffff-ffff-ffff-000000000001
      HCAPTCHA_SECRET: 0x0000000000000000000000000000000000000000
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_USER: dev
      SMTP_PASS: dev
      MAIL_FROM: IT Ticketing <no-reply@local.test>
      SEED_ON_START: "true"
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
