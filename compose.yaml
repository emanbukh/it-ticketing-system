services:
  db:
    image: mysql:8.4
    container_name: it-ticketing-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: it_ticketing
      MYSQL_USER: ticket_user
      MYSQL_PASSWORD: ticket_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: it-ticketing-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://ticket_user:ticket_pass@db:3306/it_ticketing
      SESSION_SECRET: docker-desktop-demo-secret-change-me
      SEED_ON_START: "true"
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  mysql_data:
